<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login - Local Business Platform</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Custom admin panel accent */
    :root {
      --admin-accent: #06b6d4;
    }
  </style>
</head>
<body style="background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 0%, var(--bg-color) 100%);">

  <!-- Header -->
  <header>
    <div class="nav-container">
      <div class="logo">
        🛡️ Admin<span>Portal</span>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle-btn" aria-label="Toggle Theme">🌙</button>
      </div>
    </div>
  </header>

  <!-- Auth Content -->
  <main class="auth-wrapper">
    <div class="auth-container glass-container" style="border-top: 4px solid var(--admin-accent);">
      <form id="admin-login-form" onsubmit="handleAdminLogin(event)">
        <div style="text-align: center; margin-bottom: 2rem;">
          <span style="font-size: 3rem;">🛡️</span>
          <h2 style="font-family: var(--font-heading); margin-top: 0.5rem;">Administrator Sign In</h2>
          <p style="color: var(--text-muted); font-size: 0.85rem;">Authorized personnel only</p>
        </div>

        <div class="form-group">
          <label for="admin-email">Admin Email</label>
          <input type="email" id="admin-email" class="form-control" placeholder="admin@domain.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem; background-color: var(--secondary-color);">
          Access Dashboard
        </button>

        <div style="text-align: center; margin-top: 1.5rem;">
          <a href="/index.html" style="font-size: 0.85rem; font-weight: 600; color: var(--primary-color);">
            ← Back to Customer / Shopkeeper Login
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in as admin
    const activeUser = auth.getUser();
    if (activeUser && activeUser.role.toLowerCase() === 'admin') {
      window.location.href = '/admin.html';
    }

    async function handleAdminLogin(e) {
      e.preventDefault();

      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Verify role is admin
          if (data.user.role.toLowerCase() !== 'admin') {
            auth.showToast('Access Denied: Only administrators are authorized to access this portal.', 'error');
            return;
          }

          auth.showToast('Admin authenticated successfully! Redirecting...', 'success');
          auth.saveSession(data.token, data.user);
          
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 1000);
        } else {
          auth.showToast(data.message || 'Login failed. Please check credentials.', 'error');
        }
      } catch (err) {
        console.error(err);
        auth.showToast('Network error, please try again.', 'error');
      }
    }
  </script>
</body>
</html>
